version: "3.9"

# ┌─────────────────────────────────────────────────────────────┐
# │  CodeGuardianAI — Docker Compose                            │
# │                                                             │
# │  Setup (one time):                                          │
# │    1. Copy .env.example → .env and add your API key(s)      │
# │    2. docker compose up                                     │
# │    3. Open http://localhost:8501                            │
# └─────────────────────────────────────────────────────────────┘

services:
  app:
    build: .
    image: codeguardianai:latest
    container_name: codeguardianai
    ports:
      - "8501:8501"
    env_file:
      - .env
    environment:
      - OPENAI_MODEL=${OPENAI_MODEL:-gpt-3.5-turbo}
      - DEEPSEEK_MODEL=${DEEPSEEK_MODEL:-deepseek-chat}
      - CACHE_DURATION=${CACHE_DURATION:-86400}
    volumes:
      - cache_data:/app/cache
      - log_data:/app/logs
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8501/_stcore/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

volumes:
  cache_data:
  log_data:
